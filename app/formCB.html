    <div class="container mt-5">
      <form id="formularioCuenta">
        <h3 class="mb-4">Registro de Cuenta Bancaria</h3>

        <div class="row mb-3">
          <div class="col-md-6">
            <label for="selectUsuario" class="form-label">Usuario</label>
            <select class="form-select" id="selectUsuario" name="usuario">
              <option value="" selected>Seleccione un usuario</option>
            </select>
          </div>

          <div class="col-md-6">
            <label for="inputBanco" class="form-label">Banco</label>
            <input
              type="text"
              class="form-control"
              id="inputBanco"
              name="banco"
            />
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-6">
            <label for="selectTipoCuenta" class="form-label"
              >Tipo de Cuenta</label
            >
            <select class="form-select" id="selectTipoCuenta" name="tipoCuenta">
              <option value="" selected>Seleccione un tipo</option>
              <option value="corriente">Cuenta Corriente</option>
              <option value="vista">Cuenta Vista</option>
              <option value="ahorro">Cuenta de Ahorro</option>
            </select>
          </div>

          <div class="col-md-6">
            <label for="inputNumeroCuenta" class="form-label"
              >Número de Cuenta</label
            >
            <input
              type="text"
              class="form-control"
              id="inputNumeroCuenta"
              name="numeroCuenta"
            />
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-6">
            <label for="selectMoneda" class="form-label">Moneda</label>
            <select class="form-select" id="selectMoneda" name="moneda">
              <option value="" selected>Seleccione una moneda</option>
              <option value="CLP">Peso Chileno (CLP)</option>
              <option value="USD">Dólar (USD)</option>
              <option value="EUR">Euro (EUR)</option>
            </select>
          </div>

          <div class="col-md-6">
            <label for="inputSaldo" class="form-label">Saldo</label>
            <input
              type="number"
              class="form-control"
              id="inputSaldo"
              name="saldo"
              min="0"
              step="0.01"
            />
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-6">
            <label for="inputFechaApertura" class="form-label"
              >Fecha de Apertura</label
            >
            <input
              type="date"
              class="form-control"
              id="inputFechaApertura"
              name="fechaApertura"
            />
          </div>

          <div class="col-md-6">
            <label for="selectEstado" class="form-label">Estado</label>
            <select class="form-select" id="selectEstado" name="estado">
              <option value="activa">Activa</option>
              <option value="bloqueada">Bloqueada</option>
              <option value="cerrada">Cerrada</option>
            </select>
          </div>
        </div>

        <div class="row mb-4">
          <div class="col-md-6">
            <label for="inputSucursal" class="form-label">Sucursal</label>
            <input
              type="text"
              class="form-control"
              id="inputSucursal"
              name="sucursal"
            />
          </div>

          <div class="col-md-6">
            <label for="inputTitular" class="form-label">Titular</label>
            <input
              type="text"
              class="form-control"
              id="inputTitular"
              name="titular"
            />
          </div>
        </div>

        <div class="d-flex justify-content-end gap-2">
          <button type="reset" class="btn btn-secondary">Cancelar</button>

          <button type="button" 
          class="btn btn-primary"
          onclick="validarFormulario()"> 
          Guardar Cuenta
        </button>
        </div>
      </form>
    </div>
  </body>
