<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <link href="./css/brite.css" rel="stylesheet" />
    <link rel="stylesheet" href="./css/estilos.css" />
    <link
      rel="shortcut icon"
      href="./assets/images/baloon.ico"
      type="image/x-icon"
    />

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://code.jquery.com/jquery-4.0.0.min.js"
      integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao="
      crossorigin="anonymous"
    ></script>
    <script src="./js/form.js"></script>
  </head>

  <body>
    <nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">App NoSql</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarColor01"
          aria-controls="navbarColor01"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarColor01">
          <ul class="navbar-nav me-auto">
            <li class="nav-item">
              <a class="nav-link active" href="./index.html"
                >Inicio
                <span class="visually-hidden">(current)</span>
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="./form.html">Formulario Registro</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="./formCB.html"
                >Formulario Cuenta Bancaria</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container formulario">
      <form action="" id="formularioRegistro">
        <p class="h3">Formulario de Registro</p>
        <br />

        <p class="h5">Datos Personales</p>
        <hr />
        <div class="row">
          <div class="col">
            <label for="inputNombre" class="form-label">Nombre Completo:</label>
            <input
              type="text"
              name="nombre"
              id="inputNombre"
              class="form-control"
              onchange="validarInput(this)"
            />
          </div>
          <div class="col">
            <label for="inputRut" class="form-label">RUT:</label>
            <input
              type="text"
              name="rut"
              id="inputRut"
              class="form-control"
              onchange="validarRut(this)"
            />
          </div>
        </div>
        <br />

        <div class="row">
          <div class="col">
            <label for="inputEmail" class="form-label">Email:</label>
            <input
              type="email"
              name="email"
              id="inputEmail"
              class="form-control"
              onchange="validarEmail(this)"
            />
          </div>
          <div class="col">
            <label for="dateFechaNacimiento" class="form-label"
              >Fecha de Nacimiento:</label
            >
            <input
              type="date"
              name="fechaNacimiento"
              id="dateFechaNacimiento"
              class="form-control"
            />
          </div>
          <div class="col">
            <label for="selectGenero" class="form-label">Género:</label>
            <select name="genero" id="selectGenero" class="form-select">
              <option value="" selected>Seleccione su género</option>
              <option value="masculino">Masculino</option>
              <option value="femenino">Femenino</option>
              <option value="otros">Otros</option>
            </select>
          </div>
        </div>
        <br />

        <div class="row">
          <div class="col">
            <label for="password" class="form-label">Contraseña:</label>
            <input
              type="password"
              name="contrasena"
              id="password"
              class="form-control"
              onchange="validarContrasena(this)"
            />
          </div>
          <div class="col">
            <label for="passwordRepetir" class="form-label"
              >Repetir Contraseña:</label
            >
            <input
              type="password"
              name="contrasena"
              id="passwordRepetir"
              class="form-control"
              onchange="validarRepetirContrasena(this)"
            />
          </div>
          <div class="col">
            <label for="selectNacionalidad" class="form-label"
              >Nacionalidad:</label
            >
            <select
              name="nacionalidad"
              id="selectNacionalidad"
              class="form-select"
            >
              <option value="" selected>Seleccione su nacionalidad</option>
            </select>
          </div>
        </div>
        <br />
        <br />

        <p class="h5">Dirección</p>
        <hr />

        <div class="row">
          <div class="col">
            <label for="selectComuna" class="form-label">Comuna:</label>
            <select
              name="comuna"
              id="selectComuna"
              class="form-select"
              onchange="validarInput(this)"
            >
          <option value="" selected>Seleccione su comuna</option>
          </select>
          </div>

          <div class="col">
            <label for="inputCalle" class="form-label">Calle:</label>
            <input
              type="text"
              name="calle"
              id="inputCalle"
              class="form-control"
              onchange="validarInput(this)"
            />
          </div>
        </div>
        <br />

        <div class="row">
          <div class="col">
            <label for="inputNumero" class="form-label">Número:</label>
            <input
              type="text"
              name="numero"
              id="inputNumero"
              class="form-control"
            />
          </div>

          <div class="col">
            <label for="inputDepartamento" class="form-label"
              >Departamento/Oficina:</label
            >
            <input
              type="text"
              name="departamento"
              id="inputDepartamento"
              class="form-control"
            />
          </div>
        </div>
        <br />

        <div class="row">
          <div class="col-8"></div>
          <div class="col-4 d-flex justify-content-end">
            <button type="reset" class="btn btn-secondary me-2">
              Cancelar
            </button>
            <button
              type="button"
              class="btn btn-primary"
              onclick="validarFormulario()"
            >
              Enviar
            </button>
          </div>
        </div>
      </form>
    </div>
    <div></div>
  </body>
</html>
